<!DOCTYPE html>

<html lang="ko"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Manrope:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "on-secondary-container": "#4f5f7f",
              "on-secondary": "#ffffff",
              "surface": "#f8f9fa",
              "secondary-container": "#cadaff",
              "primary-container": "#0070eb",
              "error-container": "#ffdad6",
              "surface-dim": "#d9dadb",
              "on-tertiary-container": "#f3fffc",
              "background": "#f8f9fa",
              "on-error-container": "#93000a",
              "tertiary": "#4b605d",
              "surface-container": "#edeeef",
              "surface-tint": "#005bc1",
              "tertiary-fixed-dim": "#b5cbc7",
              "surface-container-lowest": "#ffffff",
              "on-primary-fixed-variant": "#004493",
              "on-primary-fixed": "#001a41",
              "on-primary": "#ffffff",
              "tertiary-fixed": "#d0e7e3",
              "surface-container-low": "#f3f4f5",
              "on-tertiary-fixed": "#0a1f1d",
              "primary-fixed": "#d8e2ff",
              "secondary": "#4e5f7e",
              "outline-variant": "#c1c6d7",
              "error": "#ba1a1a",
              "secondary-fixed": "#d7e2ff",
              "on-secondary-fixed-variant": "#374765",
              "on-surface-variant": "#414755",
              "primary": "#0058bc",
              "surface-container-highest": "#e1e3e4",
              "on-tertiary-fixed-variant": "#364b48",
              "on-error": "#ffffff",
              "surface-container-high": "#e7e8e9",
              "on-background": "#191c1d",
              "on-secondary-fixed": "#081b38",
              "on-surface": "#191c1d",
              "primary-fixed-dim": "#adc6ff",
              "surface-bright": "#f8f9fa",
              "inverse-on-surface": "#f0f1f2",
              "tertiary-container": "#647976",
              "inverse-primary": "#adc6ff",
              "outline": "#717786",
              "on-tertiary": "#ffffff",
              "secondary-fixed-dim": "#b6c7eb",
              "surface-variant": "#e1e3e4",
              "on-primary-container": "#fefcff",
              "inverse-surface": "#2e3132"
            },
            fontFamily: {
              "headline": ["Plus Jakarta Sans"],
              "body": ["Manrope"],
              "label": ["Manrope"]
            },
            borderRadius: {"DEFAULT": "1rem", "lg": "2rem", "xl": "3rem", "full": "9999px"},
          },
        },
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            font-family: 'Manrope', sans-serif;
            background-color: #f8f9fa;
        }
        .headline-font {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface min-h-screen flex flex-col">
<!-- Top Navigation (Shell suppressed for onboarding, only back button) -->
<header class="sticky top-0 z-50 bg-white/80 backdrop-blur-xl px-6 py-4 flex items-center justify-between">
<button class="p-2 -ml-2 text-on-surface-variant hover:bg-surface-container rounded-full transition-colors active:scale-90 duration-200">
<span class="material-symbols-outlined">arrow_back_ios_new</span>
</button>
<span class="headline-font font-extrabold text-primary text-lg tracking-tight">치얼업</span>
<div class="w-10"></div> <!-- Spacer for centering title -->
</header>
<main class="flex-grow flex flex-col items-center px-6 py-8 max-w-xl mx-auto w-full">
<!-- Progress Indicator -->
<div class="w-full mb-10">
<div class="flex justify-between items-end mb-3">
<span class="text-primary font-bold text-sm headline-font tracking-widest">STEP 1/5</span>
<span class="text-on-surface-variant text-xs font-semibold">20% Completed</span>
</div>
<div class="h-2.5 w-full bg-surface-container-high rounded-full overflow-hidden">
<div class="h-full bg-primary rounded-full transition-all duration-700 ease-out" style="width: 20%;"></div>
</div>
</div>
<!-- Question Header -->
<div class="w-full mb-10 space-y-2">
<h1 class="text-3xl font-extrabold headline-font text-on-surface leading-tight">
                어느 지역에 거주하시나요?
            </h1>
<p class="text-on-surface-variant font-medium text-body-lg">
                맞춤 지원금을 찾기 위해 몇 가지만 여쭤볼게요.
            </p>
</div>
<!-- Onboarding Form Sections -->
<div class="w-full space-y-10 pb-32">
<!-- Region Selection (Primary Options) -->
<section class="space-y-4">
<label class="text-xs font-bold text-on-surface-variant uppercase tracking-wider ml-1">거주 지역 선택</label>
<div class="grid grid-cols-2 gap-4">
<button class="flex flex-col items-center justify-center p-6 bg-surface-container-lowest border-2 border-primary rounded-xl shadow-[0_8px_20px_rgba(0,88,188,0.08)] active:scale-95 transition-all">
<span class="material-symbols-outlined text-primary text-3xl mb-2" data-icon="location_on" style="font-variation-settings: 'FILL' 1;">location_on</span>
<span class="font-bold text-primary">부산</span>
</button>
<button class="flex flex-col items-center justify-center p-6 bg-surface-container-lowest border-2 border-transparent rounded-xl hover:bg-surface-container-low active:scale-95 transition-all">
<span class="material-symbols-outlined text-on-surface-variant text-3xl mb-2" data-icon="apartment">apartment</span>
<span class="font-bold text-on-surface">대구</span>
</button>
</div>
<button class="w-full py-4 bg-surface-container-lowest rounded-xl flex items-center justify-center text-on-surface-variant font-semibold hover:bg-surface-container-low transition-colors">
                    기타 지역 선택
                    <span class="material-symbols-outlined ml-2 text-sm">expand_more</span>
</button>
</section>
<!-- User Detail Inputs (Asymmetric Editorial Style) -->
<section class="space-y-8">
<!-- Age Input -->
<div class="group">
<label class="text-xs font-bold text-on-surface-variant uppercase tracking-wider ml-1 block mb-3">연령</label>
<div class="relative">
<input class="w-full bg-surface-container-lowest border-none rounded-xl py-5 px-6 text-on-surface font-semibold placeholder:text-outline focus:ring-2 focus:ring-primary/20 transition-all shadow-sm" placeholder="만 나이를 입력하세요 (예: 24)" type="number"/>
<span class="absolute right-6 top-1/2 -translate-y-1/2 text-on-surface-variant font-bold">세</span>
</div>
</div>
<!-- University Status -->
<div>
<label class="text-xs font-bold text-on-surface-variant uppercase tracking-wider ml-1 block mb-3">대학 상태</label>
<div class="flex flex-wrap gap-2">
<button class="px-6 py-3 rounded-full bg-primary text-on-primary font-bold shadow-md">재학</button>
<button class="px-6 py-3 rounded-full bg-surface-container-highest text-on-surface-variant font-bold hover:bg-surface-container-high transition-colors">휴학</button>
<button class="px-6 py-3 rounded-full bg-surface-container-highest text-on-surface-variant font-bold hover:bg-surface-container-high transition-colors">졸업</button>
<button class="px-6 py-3 rounded-full bg-surface-container-highest text-on-surface-variant font-bold hover:bg-surface-container-high transition-colors">해당없음</button>
</div>
</div>
<!-- Employment Status -->
<div>
<label class="text-xs font-bold text-on-surface-variant uppercase tracking-wider ml-1 block mb-3">취업 상태</label>
<div class="space-y-3">
<div class="flex items-center p-5 bg-surface-container-lowest rounded-xl shadow-sm border border-transparent hover:border-primary/10 transition-all cursor-pointer">
<div class="w-6 h-6 rounded-full border-2 border-primary-fixed-dim flex items-center justify-center mr-4">
<div class="w-3 h-3 bg-primary rounded-full hidden"></div>
</div>
<span class="font-bold text-on-surface">미취업 (구직 중)</span>
</div>
<div class="flex items-center p-5 bg-surface-container-lowest rounded-xl shadow-sm border border-transparent hover:border-primary/10 transition-all cursor-pointer">
<div class="w-6 h-6 rounded-full border-2 border-primary flex items-center justify-center mr-4">
<div class="w-3 h-3 bg-primary rounded-full"></div>
</div>
<span class="font-bold text-primary">재직 중 (4대 보험 가입)</span>
</div>
<div class="flex items-center p-5 bg-surface-container-lowest rounded-xl shadow-sm border border-transparent hover:border-primary/10 transition-all cursor-pointer">
<div class="w-6 h-6 rounded-full border-2 border-primary-fixed-dim flex items-center justify-center mr-4">
<div class="w-3 h-3 bg-primary rounded-full hidden"></div>
</div>
<span class="font-bold text-on-surface">기타 (아르바이트, 프리랜서 등)</span>
</div>
</div>
</div>
</section>
</div>
</main>
<!-- Sticky Action Button -->
<div class="fixed bottom-0 left-0 w-full p-6 bg-gradient-to-t from-surface via-surface to-transparent pointer-events-none">
<div class="max-w-xl mx-auto w-full pointer-events-auto">
<button class="w-full bg-gradient-to-br from-primary to-primary-container text-on-primary py-5 rounded-xl font-extrabold text-lg shadow-xl shadow-primary/20 active:scale-[0.98] transition-all flex items-center justify-center group">
                다음
                <span class="material-symbols-outlined ml-2 group-hover:translate-x-1 transition-transform" data-icon="chevron_right">chevron_right</span>
</button>
</div>
</div>
<!-- Decorative Soft Texture Elements -->
<div class="fixed top-20 -right-20 w-64 h-64 bg-primary/5 rounded-full blur-3xl -z-10"></div>
<div class="fixed bottom-40 -left-20 w-80 h-80 bg-secondary-container/10 rounded-full blur-3xl -z-10"></div>
</body></html>
